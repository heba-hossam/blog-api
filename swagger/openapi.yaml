openapi: 3.0.3
info:
  title: Personal Blogging Platform API
  description: |
    A secure RESTful API for a personal blogging platform.
    
    ## Authentication
    Protected routes require a Bearer JWT token in the Authorization header.
    Obtain a token via `POST /auth/login` or `POST /auth/register`.
    
    ```
    Authorization: Bearer <your_token_here>
    ```
  version: 1.0.0
  contact:
    name: Blog API Support

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
    description: User registration and authentication
  - name: Posts
    description: Blog post CRUD operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "64abc123def456ghi789"
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          example: "jane@example.com"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        _id:
          type: string
          example: "64abc123def456ghi000"
        title:
          type: string
          example: "My First Blog Post"
        content:
          type: string
          example: "This is the content of my first blog post..."
        author:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: "Jane Doe"
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "SecurePass1"
                  description: "Must contain at least one uppercase, lowercase, and number"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  example: "SecurePass1"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts:
    get:
      tags: [Posts]
      summary: Get all blog posts (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Posts per page (max 50)
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      posts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer
                          hasNextPage:
                            type: boolean
                          hasPrevPage:
                            type: boolean

    post:
      tags: [Posts]
      summary: Create a new post (protected)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 200
                  example: "My Awesome Post"
                content:
                  type: string
                  minLength: 10
                  example: "This is the full content of the blog post..."
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      post:
                        $ref: '#/components/schemas/Post'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post data
        '404':
          description: Post not found

    put:
      tags: [Posts]
      summary: Update a post (owner only, protected)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 200
                content:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Post updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - not the post owner
        '404':
          description: Post not found

    delete:
      tags: [Posts]
      summary: Delete a post (owner only, protected)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - not the post owner
        '404':
          description: Post not found
